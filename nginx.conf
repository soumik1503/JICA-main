worker_processes  1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8000;
        server_name 127.0.0.1 jica.tripura.gov.in;
        server_tokens off;
        charset utf-8;

        client_max_body_size 50M;

        # Security Headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # Content-Security-Policy is now handled by Django middleware
        # STATIC
        location /static/ {
            alias "c:/Users/vikram/Workspace/tripura-jica-staging/staticfiles/";
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # MEDIA
        location /media/ {
            alias "c:/Users/vikram/Workspace/tripura-jica-staging/media/";
            access_log off;
            expires 30d;
            try_files $uri =404;
        }

        # Block trailing slash on files
        location ~ ^/(static|media)/.+/$ {
            return 404;
        }

        # Django
        location / {
            proxy_pass http://127.0.0.1:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
