events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Hide Nginx version number from Server response header
    server_tokens off;

    server {
        listen       8000;
        server_name  _;

        # Divert specific static directory accesses to Django to render the custom 404 page
        location ~ ^/static/(cms|images|Admin)/?$ {
            proxy_pass http://web:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files
        location /static/ {
            alias /app/staticfiles/;
        }

        # Media files
        location /media/ {
            alias /app/media/;
        }

        # Proxy to Django/Waitress
        location / {
            proxy_pass http://web:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security Headers are now handled by Django middleware
            # We only keep headers that Nginx should definitely handle or override if needed.
            # But let's try removing them all to see if CSP passes through.
        }
    }
}
