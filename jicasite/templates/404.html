{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Page Not Found" %}{% endblock title %}

{% block content %}
<div class="container mx-auto px-4 py-16 text-center">
    <h1 class="text-6xl font-bold text-gray-800 mb-4">404</h1>
    <h2 class="text-2xl font-semibold text-gray-600 mb-8">{% trans "Page Not Found" %}</h2>
    <p class="text-gray-500 mb-8">
        {% trans "We're sorry, but the page you requested could not be found." %}
    </p>
    <a href="/" class="inline-block bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded transition duration-200">
        {% trans "Go to Homepage" %}
    </a>
</div>
{% endblock content %}
